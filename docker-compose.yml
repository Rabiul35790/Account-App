version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: accounting-app
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      APP_ENV: production
      APP_DEBUG: false
      APP_URL: https://your-domain.com
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: accounting
      DB_USERNAME: accounting_user
      DB_PASSWORD: "${DB_PASSWORD}"
      REDIS_HOST: redis
      REDIS_PASSWORD: null
      REDIS_PORT: 6379
      SESSION_DRIVER: redis
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      FILESYSTEM_DISK: local
      MAIL_MAILER: smtp
      MAIL_HOST: "${MAIL_HOST}"
      MAIL_PORT: 587
      MAIL_USERNAME: "${MAIL_USERNAME}"
      MAIL_PASSWORD: "${MAIL_PASSWORD}"
      MAIL_ENCRYPTION: tls
      MAIL_FROM_ADDRESS: "${MAIL_FROM_ADDRESS}"
      MAIL_FROM_NAME: "${APP_NAME}"
      SANCTUM_STATEFUL_DOMAINS: your-domain.com
      SESSION_DOMAIN: .your-domain.com
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - accounting-network

  db:
    image: mysql:8.0
    container_name: accounting-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD}"
      MYSQL_DATABASE: accounting
      MYSQL_USER: accounting_user
      MYSQL_PASSWORD: "${DB_PASSWORD}"
    ports:
      - "3307:3306"
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 10
    networks:
      - accounting-network

  redis:
    image: redis:7-alpine
    container_name: accounting-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    networks:
      - accounting-network

  queue-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: accounting-queue
    restart: unless-stopped
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    environment:
      APP_ENV: production
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: accounting
      DB_USERNAME: accounting_user
      DB_PASSWORD: "${DB_PASSWORD}"
      REDIS_HOST: redis
      REDIS_PASSWORD: null
      REDIS_PORT: 6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - accounting-network

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: accounting-scheduler
    restart: unless-stopped
    command: php artisan schedule:work
    environment:
      APP_ENV: production
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: accounting
      DB_USERNAME: accounting_user
      DB_PASSWORD: "${DB_PASSWORD}"
      REDIS_HOST: redis
      REDIS_PASSWORD: null
      REDIS_PORT: 6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - accounting-network

volumes:
  db-data:
  redis-data:

networks:
  accounting-network:
    driver: bridge
